# Docker Compose for HintGrid development environment
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  hintgrid-neo4j:
    image: neo4j:5.26.0
    container_name: hintgrid-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_dbms_security_procedures_allowlist: gds.*,apoc.*
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Memory settings for development
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  hintgrid-redis:
    image: redis:7-alpine
    container_name: hintgrid-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --maxmemory 100mb --maxmemory-policy allkeys-lru --loglevel warning
    # Redis is in-memory only (--save ""), tmpfs avoids disk writes entirely
    tmpfs:
      - /data:size=64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  hintgrid-postgres:
    image: postgres:16-alpine
    container_name: hintgrid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: mastodon
      POSTGRES_DB: mastodon_production
    command: postgres -c shared_buffers=128MB -c max_connections=200 -c work_mem=4MB -c maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastodon -d mastodon_production"]
      interval: 2s
      timeout: 2s
      retries: 10

  hintgrid-ollama:
    image: ollama/ollama:latest
    container_name: hintgrid-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
  ollama_data:
